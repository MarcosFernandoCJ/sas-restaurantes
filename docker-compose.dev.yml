# =============================================================================
# docker-compose.dev.yml — Desarrollo con hot reload (archivo independiente)
# Uso: docker-compose -f docker-compose.dev.yml up --build
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy (acceso unificado en puerto 80)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - sas-network

  # ---------------------------------------------------------------------------
  # Frontend dev — Vite dev server con HMR (puerto 3000)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: infra/docker/web.dev.Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/ui:/app/packages/ui
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
      - /app/apps/web/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3001
      - VITE_WS_URL=ws://localhost:3001
    networks:
      - sas-network

  # ---------------------------------------------------------------------------
  # API dev — tsx watch con hot reload (puerto 3001)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infra/docker/api.dev.Dockerfile
    ports:
      - '3001:3001'
      - '5555:5555'
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
      - /app/apps/api/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://sas:sas_password@db:5432/sas_restaurante
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_secret_change_in_production
      - CORS_ORIGIN=http://localhost:3000
      - SEED_DB=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sas-network

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sas
      POSTGRES_PASSWORD: sas_password
      POSTGRES_DB: sas_restaurante
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sas -d sas_restaurante']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sas-network

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - sas-network

  # ---------------------------------------------------------------------------
  # pgAdmin — Solo en desarrollo (puerto 5050)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sas.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    depends_on:
      - db
    networks:
      - sas-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

# -----------------------------------------------------------------------------
volumes:
  postgres_dev_data:
  pgadmin_data:

networks:
  sas-network:
    driver: bridge
