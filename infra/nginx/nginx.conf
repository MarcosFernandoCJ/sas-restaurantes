# =============================================================================
# nginx.conf — Reverse proxy
# resolver 127.0.0.11: DNS interno de Docker (re-lookup por request, no en startup)
# rewrite explícito: necesario cuando proxy_pass usa variable ($var)
# =============================================================================

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=5s ipv6=off;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # --- API REST: /api/xxx → api:3001/xxx ---
    location /api/ {
        set $api api:3001;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://$api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # --- WebSocket / Socket.io ---
    location /socket.io/ {
        set $api api:3001;
        proxy_pass http://$api/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # --- Frontend (SPA) ---
    location / {
        set $frontend frontend:3000;
        proxy_pass http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
